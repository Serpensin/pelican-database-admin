include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - secret-detection
  - release

variables:
  SECRET_DETECTION_ENABLED: 'true'

php-syntax:
  image: php:8.3-cli
  stage: test
  script:
    - find . -path './resources/adminer/adminer.php' -prune -o -path './resources/adminer/plugins' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
    - php -r "json_decode(file_get_contents('plugin.json'), true, 512, JSON_THROW_ON_ERROR); json_decode(file_get_contents('update.json'), true, 512, JSON_THROW_ON_ERROR); json_decode(file_get_contents('adminer-vendor.json'), true, 512, JSON_THROW_ON_ERROR);"

vendor-adminer-fetch:
  image: alpine:3.20
  stage: test
  before_script:
    - apk add --no-cache python3 php-cli
  script:
    - python3 scripts/vendor_adminer.py fetch --target /tmp/adminer-vendor
    - find /tmp/adminer-vendor -name '*.php' -print0 | xargs -0 -n1 php -l

create-release-tag:
  image: alpine:3.20
  stage: release
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - update.json
    - when: never
  before_script:
    - apk add --no-cache git python3
  script:
    - git fetch --tags origin
    - python3 scripts/ci_detect_release_version.py
    - set -a; . ./release.env; set +a
    - |
      if [ "$SHOULD_CREATE_TAG" != "true" ]; then
        echo "No untagged update.json version found; release tag creation skipped."
        exit 0
      fi
    - python3 scripts/ci_create_release_tag.py
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release.env
    expire_in: 1 week

release-zip:
  image: alpine:3.20
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: never
  before_script:
    - apk add --no-cache zip curl python3
  script:
    - python3 scripts/ci_assert_tag_in_update_json.py
    - python3 scripts/package.py
    - cp dist/serpensin-database-admin.zip serpensin-database-admin.zip
    - test -s serpensin-database-admin.zip
    - |
      package_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/serpensin-database-admin/${CI_COMMIT_TAG#v}/serpensin-database-admin.zip"
      upload_status=$(curl --silent --show-error --output /tmp/package-upload-response.json --write-out '%{http_code}' \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file serpensin-database-admin.zip \
        "$package_url")
      if [ "$upload_status" = "201" ]; then
        cat /tmp/package-upload-response.json
      elif [ "$upload_status" = "400" ] || [ "$upload_status" = "409" ]; then
        echo "Package already exists for ${CI_COMMIT_TAG}; reusing $package_url"
        cat /tmp/package-upload-response.json || true
      else
        echo "ERROR: package upload failed with HTTP $upload_status"
        cat /tmp/package-upload-response.json || true
        exit 1
      fi
    - |
      curl --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --form "name=Release ${CI_COMMIT_TAG}" \
        --form "tag_name=${CI_COMMIT_TAG}" \
        --form "description=Automated release for ${CI_COMMIT_TAG}" \
        --form "assets[links][][name]=serpensin-database-admin.zip" \
        --form "assets[links][][url]=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/serpensin-database-admin/${CI_COMMIT_TAG#v}/serpensin-database-admin.zip" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
      || curl --fail --request PUT \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --form "description=Automated release for ${CI_COMMIT_TAG}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}"
  artifacts:
    paths:
      - serpensin-database-admin.zip
    expire_in: 1 week
